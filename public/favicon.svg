<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Marca de Felipe Caro: tesseracto (cubo dentro de cubo). Versión
       favicon: solo la cara frontal, con trazo engrosado, para legibilidad
       a 16px (el detalle completo del tesseracto se pierde a ese tamaño). -->
